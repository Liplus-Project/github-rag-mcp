name = "github-rag-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-26"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "RagMcpAgentV2" },
  { name = "ISSUE_STORE", class_name = "IssueStore" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RagMcpAgent", "IssueStore"]

# v2: add RagMcpAgentV2 as a fresh class and re-point MCP_OBJECT binding to it.
# First request to MCP_OBJECT now lands on a brand-new V2 instance and re-runs
# init(), publishing the current 9-value type enum (issue #109).
# Old RagMcpAgent DO instances remain in storage but are no longer bound or
# referenced. Their deletion is deferred to a later PR to keep this migration
# minimal and avoid the deleted_classes binding-coupling constraint.
# IssueStore is untouched; indexed content in Vectorize + D1 FTS5 is preserved.
[[migrations]]
tag = "v2"
new_sqlite_classes = ["RagMcpAgentV2"]

# KV namespace for OAuth provider (token, client, grant storage)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "67611ab57f734f1c9a0b5d5a96f65e78"

# Vectorize index for semantic search (dense side of hybrid retrieval)
[[vectorize]]
binding = "VECTORIZE"
index_name = "github-rag-issues"

# D1 database for full-text search (sparse side of hybrid retrieval, BM25 via FTS5)
# database_id must be replaced with the actual ID after running:
#   wrangler d1 create github-rag-fts
# Migrations live in ./migrations and are applied via:
#   wrangler d1 migrations apply github-rag-fts
[[d1_databases]]
binding = "DB_FTS"
database_name = "github-rag-fts"
database_id = "5e18ffa8-584c-452e-b906-2cf71120c7ad"
migrations_dir = "migrations"

# Workers AI binding for embedding generation (BGE-M3)
[ai]
binding = "AI"

# Cron Triggers — hourly fallback poll (primary updates via webhook).
# Each surface group runs in its own invocation so it gets a fresh Workers
# subrequest budget. Bundling comments + diffs together still tripped the
# per-Worker limit (issue #122) because each upsert fans out to Store DO +
# Vectorize + D1 FTS + AI embed.
#   :00 — light surfaces  (issues, releases, docs)
#   :15 — comments surface (pollComments)
#   :30 — diffs surface    (pollDiffs)
[triggers]
crons = ["0 * * * *", "15 * * * *", "30 * * * *"]

# Required secrets (set via `wrangler secret put <NAME>`):
# GITHUB_CLIENT_ID      — GitHub App OAuth client ID
# GITHUB_CLIENT_SECRET   — GitHub App OAuth client secret
# GITHUB_TOKEN           — GitHub token for API polling (PAT or installation token)

# Environment variables
[vars]
POLL_REPOS = "Liplus-Project/github-webhook-mcp,Liplus-Project/github-rag-mcp,Liplus-Project/liplus-desktop,Liplus-Project/liplus-language,Liplus-Project/dipper_ai"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
